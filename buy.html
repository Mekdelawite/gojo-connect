<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Properties - HomeDirect Ethiopia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Ethiopic:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Buy Page Specific Styles */
        .buy-header {
            background: var(--gradient-primary);
            color: white;
            padding: 3rem 5%;
            text-align: center;
        }
        
        .filters-section {
            background: white;
            padding: 2rem;
            border-radius: var(--border-radius-lg);
            margin-top: -2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 10;
        }
        
        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .filter-group label {
            font-weight: 600;
            color: var(--primary);
        }
        
        .filter-group select,
        .filter-group input {
            padding: 0.8rem;
            border: 1px solid var(--gray);
            border-radius: var(--border-radius);
            font-family: inherit;
        }
        
        .price-range {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        
        .filter-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }
        
        .sort-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 2rem 0;
            padding: 1rem;
            background: white;
            border-radius: var(--border-radius);
        }
        
        .results-count {
            font-weight: 600;
            color: var(--primary);
        }
        
        .sort-select {
            padding: 0.5rem;
            border: 1px solid var(--gray);
            border-radius: var(--border-radius);
        }
        
        .view-toggle {
            display: flex;
            gap: 0.5rem;
        }
        
        .view-btn {
            padding: 0.5rem;
            border: 1px solid var(--gray);
            background: white;
            border-radius: var(--border-radius);
            cursor: pointer;
        }
        
        .view-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .properties-grid.grid-view {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }
        
        .properties-grid.list-view {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .properties-grid.list-view .property-card {
            display: flex;
            flex-direction: row;
            height: 200px;
        }
        
        .properties-grid.list-view .property-image {
            width: 300px;
            height: 100%;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 3rem 0;
        }
        
        .page-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--gray);
            background: white;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .page-btn:hover:not(.active) {
            background: var(--gray);
        }
        
        .map-view {
            height: 500px;
            background: var(--light-gray);
            border-radius: var(--border-radius-lg);
            margin: 2rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <!-- Navigation (same as index.html) -->
    <nav class="navbar">
        <div class="logo" onclick="navigateTo('index')">
            HomeDirect <span class="amharic">ሆምዳይሬክት</span>
        </div>
        <div class="nav-links">
            <a href="index.html" data-en="Home" data-am="መነሻ">Home</a>
            <a href="buy.html" class="active" data-en="Buy" data-am="መግዛት">Buy</a>
            <a href="rent.html" data-en="Rent" data-am="ማከራየት">Rent</a>
            <a href="sell.html" data-en="Sell" data-am="መሸጥ">Sell</a>
            <a href="#" onclick="openModal('login')" data-en="Login" data-am="ግባ">Login</a>
            <button class="btn btn-primary" onclick="openModal('signup')" data-en="Sign Up" data-am="ተመዝገብ">Sign Up</button>
        </div>
        <div class="mobile-menu" onclick="toggleMobileMenu()">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <!-- Buy Header -->
    <section class="buy-header">
        <h1 data-en="Find Your Dream Home" data-am="ሕልምዎ የሆነ ቤት ያግኙ">
            Find Your Dream Home
        </h1>
        <p data-en="Browse thousands of verified properties for sale in Ethiopia"
           data-am="በኢትዮጵያ ውስጥ ለሽያጭ የቀረቡ በሺዎች የሚቆጠሩ የተረጋገጡ ንብረቶችን ይመልከቱ">
            Browse thousands of verified properties for sale in Ethiopia
        </p>
    </section>

    <!-- Filters -->
    <div class="container">
        <div class="filters-section">
            <div class="filters-grid">
                <div class="filter-group">
                    <label data-en="Location" data-am="አካባቢ">Location</label>
                    <select id="locationFilter">
                        <option value="all" data-en="All Addis Ababa" data-am="ሁሉም አዲስ አበባ">All Addis Ababa</option>
                        <option value="bole">Bole</option>
                        <option value="kazanchis">Kazanchis</option>
                        <option value="cmc">CMC</option>
                        <option value="old-airport">Old Airport</option>
                        <option value="piazza">Piazza</option>
                        <option value="megenagna">Megenagna</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label data-en="Property Type" data-am="የንብረት አይነት">Property Type</label>
                    <select id="typeFilter">
                        <option value="all" data-en="All Types" data-am="ሁሉም አይነት">All Types</option>
                        <option value="house">House</option>
                        <option value="apartment">Apartment</option>
                        <option value="villa">Villa</option>
                        <option value="condo">Condo</option>
                        <option value="land">Land</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label data-en="Bedrooms" data-am="መኝታ ቤት">Bedrooms</label>
                    <select id="bedroomsFilter">
                        <option value="any" data-en="Any" data-am="ማንኛውም">Any</option>
                        <option value="1">1+</option>
                        <option value="2">2+</option>
                        <option value="3">3+</option>
                        <option value="4">4+</option>
                        <option value="5">5+</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label data-en="Price Range (Birr)" data-am="የዋጋ ገደብ (ብር)">Price Range (Birr)</label>
                    <div class="price-range">
                        <input type="number" id="minPrice" placeholder="Min" min="0" step="100000">
                        <span>-</span>
                        <input type="number" id="maxPrice" placeholder="Max" min="0" step="100000">
                    </div>
                </div>
            </div>
            
            <div class="filter-actions">
                <button class="btn btn-outline" onclick="resetFilters()">
                    <i class="fas fa-undo"></i> <span data-en="Reset" data-am="ዳግም አስጀምር">Reset</span>
                </button>
                <button class="btn btn-primary" onclick="applyFilters()">
                    <i class="fas fa-search"></i> <span data-en="Apply Filters" data-am="ማጣሪያ ተግብር">Apply Filters</span>
                </button>
            </div>
        </div>
        
        <!-- Sort Bar -->
        <div class="sort-bar">
            <div class="results-count" id="resultsCount">
                <span data-en="Showing" data-am="እያሳየ ያለው">Showing</span> <span id="propertyCount">24</span> <span data-en="properties" data-am="ንብረቶች">properties</span>
            </div>
            
            <div style="display: flex; gap: 1rem; align-items: center;">
                <select class="sort-select" id="sortSelect" onchange="sortProperties()">
                    <option value="newest" data-en="Newest First" data-am="አዲስ መጀመሪያ">Newest First</option>
                    <option value="price-low" data-en="Price: Low to High" data-am="ዋጋ፡ ከዝቅተኛ ወደ ከፍተኛ">Price: Low to High</option>
                    <option value="price-high" data-en="Price: High to Low" data-am="ዋጋ፡ ከከፍተኛ ወደ ዝቅተኛ">Price: High to Low</option>
                    <option value="popular" data-en="Most Popular" data-am="በጣም ታዋቂ">Most Popular</option>
                </select>
                
                <div class="view-toggle">
                    <button class="view-btn active" onclick="toggleView('grid')">
                        <i class="fas fa-th"></i>
                    </button>
                    <button class="view-btn" onclick="toggleView('list')">
                        <i class="fas fa-list"></i>
                    </button>
                    <button class="view-btn" onclick="toggleView('map')">
                        <i class="fas fa-map"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Properties Grid -->
        <div id="propertiesContainer" class="properties-grid grid-view">
            <!-- Properties loaded via JavaScript -->
        </div>
        
        <!-- Map View (hidden by default) -->
        <div id="mapView" class="map-view" style="display: none;">
            <i class="fas fa-map-marked-alt" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <p data-en="Map view coming soon" data-am="የካርታ እይታ በቅርቡ ይመጣል">Map view coming soon</p>
        </div>
        
        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <button class="page-btn"><i class="fas fa-chevron-left"></i></button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn">4</button>
            <button class="page-btn">5</button>
            <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <!-- Footer (same as index.html) -->
    <footer class="footer">
        <!-- ... footer content ... -->
    </footer>

    <script src="js/language.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/properties.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Buy page specific functions
        let currentView = 'grid';
        let currentPage = 1;
        let totalPages = 10;
        
        function loadBuyProperties() {
            const container = document.getElementById('propertiesContainer');
            const mockProperties = generateMockProperties(24);
            
            container.innerHTML = mockProperties.map(property => `
                <div class="property-card" onclick="viewProperty('${property.id}')">
                    <div class="property-image">
                        <i class="fas fa-home"></i>
                        <span class="property-tag">For Sale</span>
                        <span class="property-verified">
                            <i class="fas fa-check-circle"></i> Verified
                        </span>
                    </div>
                    <div class="property-details">
                        <div class="property-price">₿${property.price.toLocaleString()}</div>
                        <div class="property-location">
                            <i class="fas fa-map-marker-alt"></i> ${property.location}
                        </div>
                        <div class="property-features">
                            <span><i class="fas fa-bed"></i> ${property.bedrooms} Bed</span>
                            <span><i class="fas fa-bath"></i> ${property.bathrooms} Bath</span>
                            <span><i class="fas fa-vector-square"></i> ${property.area} sq.m</span>
                        </div>
                        <div class="owner-info">
                            <div class="owner-avatar">${property.owner.charAt(0)}</div>
                            <div>
                                <div style="font-weight: 600;">${property.owner}</div>
                                <div class="verified-badge">
                                    <i class="fas fa-check-circle"></i> FaydaID Verified
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function generateMockProperties(count) {
            const locations = ['Bole', 'Kazanchis', 'CMC', 'Old Airport', 'Megenagna', 'Piazza', 'Gergi', 'Sarbet'];
            const owners = ['Alemitu T.', 'Biruk D.', 'Meron G.', 'Henok T.', 'Azeb D.', 'Birtukan T.'];
            const properties = [];
            
            for (let i = 0; i < count; i++) {
                properties.push({
                    id: 'PROP' + (1000 + i),
                    price: Math.floor(Math.random() * 8000000) + 1000000,
                    location: locations[Math.floor(Math.random() * locations.length)],
                    bedrooms: Math.floor(Math.random() * 4) + 1,
                    bathrooms: Math.floor(Math.random() * 3) + 1,
                    area: Math.floor(Math.random() * 200) + 80,
                    owner: owners[Math.floor(Math.random() * owners.length)]
                });
            }
            
            return properties;
        }
        
        function applyFilters() {
            const location = document.getElementById('locationFilter').value;
            const type = document.getElementById('typeFilter').value;
            const bedrooms = document.getElementById('bedroomsFilter').value;
            const minPrice = document.getElementById('minPrice').value;
            const maxPrice = document.getElementById('maxPrice').value;
            
            showNotification('Applying filters...', 'info');
            
            // Simulate filtering
            setTimeout(() => {
                loadBuyProperties();
                showNotification('Filters applied', 'success');
            }, 1000);
        }
        
        function resetFilters() {
            document.getElementById('locationFilter').value = 'all';
            document.getElementById('typeFilter').value = 'all';
            document.getElementById('bedroomsFilter').value = 'any';
            document.getElementById('minPrice').value = '';
            document.getElementById('maxPrice').value = '';
            
            showNotification('Filters reset', 'info');
            loadBuyProperties();
        }
        
        function sortProperties() {
            const sortBy = document.getElementById('sortSelect').value;
            showNotification(`Sorting by ${sortBy}`, 'info');
            loadBuyProperties();
        }
        
        function toggleView(view) {
            const container = document.getElementById('propertiesContainer');
            const mapView = document.getElementById('mapView');
            const viewBtns = document.querySelectorAll('.view-btn');
            
            viewBtns.forEach(btn => btn.classList.remove('active'));
            event.target.closest('.view-btn').classList.add('active');
            
            if (view === 'grid') {
                container.className = 'properties-grid grid-view';
                container.style.display = 'grid';
                mapView.style.display = 'none';
            } else if (view === 'list') {
                container.className = 'properties-grid list-view';
                container.style.display = 'flex';
                mapView.style.display = 'none';
            } else {
                container.style.display = 'none';
                mapView.style.display = 'flex';
            }
            
            currentView = view;
        }
        
        // Load properties on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadBuyProperties();
            
            // Check for search query from home page
            const searchQuery = localStorage.getItem('searchQuery');
            if (searchQuery) {
                document.getElementById('locationFilter').value = 'all';
                showNotification(`Searching for "${searchQuery}"`, 'info');
                localStorage.removeItem('searchQuery');
            }
        });
    </script>
</body>
</html>
